<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>CRT TV YouTube Player</title>

  <style>
    :root {
      --wall-top: #141827;
      --wall-bottom: #07080d;
      --wood-light: #6a4d3d;
      --wood-mid: #3c2a22;
      --wood-dark: #1d1411;
      --cream: #f4e7d3;
      --green: #85ffb7;
      --shadow: rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 12%, rgba(65, 75, 110, 0.55), transparent 35%),
        linear-gradient(180deg, var(--wall-top), var(--wall-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .page {
      width: min(1120px, 100%);
      display: grid;
      gap: 22px;
      justify-items: center;
    }

    .headline {
      text-align: center;
      max-width: 820px;
    }

    .headline h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .headline p {
      margin: 0;
      opacity: 0.82;
      line-height: 1.5;
    }

    .tv {
      position: relative;
      width: min(96vw, 980px);
      aspect-ratio: 16 / 10.8;
      border-radius: 34px;
      padding: 36px 42px 76px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.16), transparent 18%),
        linear-gradient(145deg, var(--wood-light), var(--wood-mid) 48%, var(--wood-dark));
      box-shadow:
        0 36px 90px var(--shadow),
        inset 0 2px 4px rgba(255,255,255,0.14),
        inset 0 -12px 24px rgba(0,0,0,0.42);
    }

    .tv::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .tv::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 20px;
      height: 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.26);
      filter: blur(10px);
    }

    .screen-frame {
      position: absolute;
      left: 4.5%;
      top: 7%;
      width: 73%;
      height: 75%;
      border-radius: 32px;
      padding: 15px;
      background:
        linear-gradient(145deg, #2e221d, #0e0b0a 55%, #46342a);
      box-shadow:
        0 0 0 8px rgba(120, 91, 71, 0.42),
        inset 0 0 24px rgba(0,0,0,0.9),
        0 14px 30px rgba(0,0,0,0.36);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      background: #020503;
      box-shadow:
        inset 0 0 72px rgba(0,0,0,0.92),
        0 0 30px rgba(115,255,178,0.14);
    }

    .screen .tube-curve {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      z-index: 12;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 30%, transparent 0%, transparent 58%, rgba(0,0,0,0.28) 100%),
        radial-gradient(circle at 50% -20%, rgba(255,255,255,0.16), transparent 38%),
        linear-gradient(110deg, rgba(255,255,255,0.16), transparent 24%, transparent 74%, rgba(255,255,255,0.04));
      mix-blend-mode: screen;
    }

    .screen .scanlines {
      position: absolute;
      inset: 0;
      z-index: 13;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.045) 50%, rgba(0,0,0,0.18) 50%);
      background-size: 100% 4px;
      opacity: 0.5;
      animation: scanMove 7s linear infinite;
    }

    .screen .noise {
      position: absolute;
      inset: -50%;
      z-index: 14;
      pointer-events: none;
      opacity: 0.07;
      background-image:
        repeating-radial-gradient(circle at 17% 32%, rgba(255,255,255,0.75) 0 1px, transparent 1px 4px),
        repeating-radial-gradient(circle at 83% 66%, rgba(255,255,255,0.45) 0 1px, transparent 1px 5px);
      animation: noiseShift 0.22s steps(2) infinite;
      mix-blend-mode: screen;
    }

    .screen .vignette {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      box-shadow: inset 0 0 65px rgba(0,0,0,0.72);
      border-radius: 22px;
    }

    .player-wrap {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(0.86);
      filter: brightness(1.07) contrast(1.06) saturate(1.05);
      animation: videoReveal 1.1s ease-out 2.15s forwards;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      transform: scale(1.025);
      transform-origin: center;
    }

    .power-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: #000;
      border-radius: 22px;
      overflow: hidden;
      pointer-events: none;
      animation: powerLayerGone 0.1s linear 2.65s forwards;
    }

    .power-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: var(--green);
      box-shadow:
        0 0 16px var(--green),
        0 0 46px rgba(133,255,183,0.75);
      animation: dotPower 1.2s ease-out forwards;
    }

    .power-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0%;
      height: 4px;
      transform: translate(-50%, -50%);
      background: #eaffef;
      border-radius: 999px;
      box-shadow:
        0 0 14px #eaffef,
        0 0 42px rgba(133,255,183,0.85);
      animation: linePower 1.25s ease-out 0.7s forwards;
    }

    .power-flash {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle, rgba(230,255,238,0.95), rgba(133,255,183,0.32) 34%, transparent 64%);
      opacity: 0;
      animation: flashPower 1.5s ease-out 1.2s forwards;
    }

    .static-burst {
      position: absolute;
      inset: -20%;
      background:
        repeating-radial-gradient(circle, rgba(255,255,255,0.75) 0 1px, rgba(0,0,0,0.95) 1px 2px);
      opacity: 0;
      animation: staticBurst 0.8s steps(4) 1.6s forwards;
    }

    .side-panel {
      position: absolute;
      right: 4%;
      top: 8%;
      width: 17%;
      height: 73%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
      align-items: start;
    }

    .speaker {
      border-radius: 20px;
      padding: 14px;
      background: linear-gradient(145deg, #1b1411, #4a372d);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.08),
        inset 0 -8px 16px rgba(0,0,0,0.38);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-content: center;
      min-height: 230px;
    }

    .speaker span {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #705d50, #1c1410 55%, #090706);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.12);
    }

    .controls {
      display: grid;
      justify-items: center;
      gap: 14px;
      padding: 10px 0;
    }

    .dial {
      width: clamp(58px, 7vw, 76px);
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      background:
        radial-gradient(circle at 33% 28%, #d7c3a7, #94765e 24%, #50382c 58%, #201713);
      box-shadow:
        0 7px 12px rgba(0,0,0,0.32),
        inset 0 2px 4px rgba(255,255,255,0.22),
        inset 0 -5px 12px rgba(0,0,0,0.44);
    }

    .dial::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 12%;
      width: 7px;
      height: 18px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: #fff3dd;
      box-shadow: 0 0 8px rgba(255,255,255,0.42);
    }

    .buttons {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .button {
      border: 0;
      color: #2b160c;
      background: #f1d2a4;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
      box-shadow: 0 5px 14px rgba(0,0,0,0.28);
    }

    .button.secondary {
      background: #2b211c;
      color: #f4e7d3;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .status {
      min-height: 1.35em;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.88;
      line-height: 1.4;
    }

    .brand {
      position: absolute;
      left: 7%;
      bottom: 31px;
      z-index: 2;
      color: #efdcc2;
      font-size: clamp(0.78rem, 1.2vw, 1rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.95;
    }

    .led {
      position: absolute;
      left: 25%;
      bottom: 32px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #83ffb5;
      box-shadow: 0 0 12px #83ffb5, 0 0 26px rgba(131,255,181,0.5);
      animation: ledPulse 1.5s ease-in-out infinite;
    }

    .legs::before,
    .legs::after {
      content: "";
      position: absolute;
      bottom: -34px;
      width: 22px;
      height: 66px;
      border-radius: 0 0 12px 12px;
      background: linear-gradient(180deg, #7a5947, #231713);
      box-shadow: 0 10px 16px rgba(0,0,0,0.34);
      z-index: -1;
    }

    .legs::before {
      left: 15%;
      transform: rotate(14deg);
    }

    .legs::after {
      right: 15%;
      transform: rotate(-14deg);
    }

    .note {
      max-width: 850px;
      text-align: center;
      line-height: 1.55;
      opacity: 0.84;
      font-size: 0.96rem;
    }

    .note code {
      background: rgba(255,255,255,0.08);
      padding: 3px 7px;
      border-radius: 7px;
    }

    @keyframes scanMove {
      from { background-position: 0 0; }
      to { background-position: 0 120px; }
    }

    @keyframes noiseShift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-3%, 2%); }
      50% { transform: translate(2%, -3%); }
      75% { transform: translate(4%, 1%); }
      100% { transform: translate(-1%, -2%); }
    }

    @keyframes dotPower {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
      20% { opacity: 1; }
      65% { transform: translate(-50%, -50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.05); }
    }

    @keyframes linePower {
      0% { width: 0%; opacity: 0; }
      20% { opacity: 1; }
      72% { width: 94%; height: 4px; }
      100% { width: 100%; height: 100%; opacity: 0.55; }
    }

    @keyframes flashPower {
      0% { opacity: 0; transform: scaleY(0.02); }
      35% { opacity: 0.92; transform: scaleY(0.15); }
      75% { opacity: 0.6; transform: scaleY(1); }
      100% { opacity: 0; transform: scaleY(1); }
    }

    @keyframes staticBurst {
      0% { opacity: 0; transform: translate(0, 0); }
      25% { opacity: 0.16; transform: translate(1%, -1%); }
      50% { opacity: 0.24; transform: translate(-1%, 2%); }
      75% { opacity: 0.12; transform: translate(2%, 1%); }
      100% { opacity: 0; transform: translate(0, 0); }
    }

    @keyframes powerLayerGone {
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes videoReveal {
      0% { opacity: 0; transform: scale(0.92); }
      40% { opacity: 0.92; transform: scale(1.025); }
      70% { opacity: 0.75; transform: scale(0.995); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes ledPulse {
      0%, 100% { opacity: 0.56; }
      50% { opacity: 1; }
    }

    @media (max-width: 760px) {
      body {
        padding: 18px;
      }

      .tv {
        aspect-ratio: 9 / 12.5;
        padding: 22px 22px 72px;
      }

      .screen-frame {
        position: relative;
        left: auto;
        top: auto;
        width: 100%;
        height: 54%;
      }

      .side-panel {
        position: relative;
        right: auto;
        top: auto;
        width: 100%;
        height: auto;
        margin-top: 24px;
        display: flex;
        gap: 18px;
        justify-content: center;
        align-items: stretch;
      }

      .speaker {
        width: 52%;
        min-height: 160px;
      }

      .controls {
        width: 42%;
        align-content: center;
      }

      .brand {
        left: 8%;
        bottom: 26px;
      }

      .led {
        left: 36%;
        bottom: 28px;
      }

      .legs::before,
      .legs::after {
        height: 42px;
        bottom: -24px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="headline">
      <h1>MIMI TV</h1>
      <p>why this site; because you are one of a kind Mimi.</p>
    </header>

    <section class="tv legs" aria-label="Old CRT television with YouTube video">
      <div class="screen-frame">
        <div class="screen">
          <div class="player-wrap" id="playerWrap"></div>

          <div class="power-layer" aria-hidden="true">
            <div class="power-dot"></div>
            <div class="power-line"></div>
            <div class="power-flash"></div>
            <div class="static-burst"></div>
          </div>

          <div class="tube-curve"></div>
          <div class="scanlines"></div>
          <div class="noise"></div>
          <div class="vignette"></div>
        </div>
      </div>

      <aside class="side-panel" aria-label="TV controls">
        <div class="speaker" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>

        <div class="controls">
          <div class="dial" aria-hidden="true"></div>
          <div class="dial" aria-hidden="true"></div>

          <div class="buttons">
            <button class="button" id="reloadBtn" type="button">Power Again</button>
            <a class="button secondary" href="https://www.youtube.com/watch?v=0utNRgcUzYY" target="_blank" rel="noopener noreferrer">Open YouTube</a>
          </div>

          <div class="status" id="statusText">Starting muted autoplay...</div>
        </div>
      </aside>

      <div class="brand">RetroTube</div>
      <div class="led" aria-hidden="true"></div>
    </section>

    <p class="note">
      Upload this file as <code>index.html</code> to GitHub Pages or your hosting.
      Autoplay is muted because most browsers block autoplay with sound. Use the YouTube controls to unmute.
    </p>
  </main>

  <script>
    const videoId = "0utNRgcUzYY";
    const playerWrap = document.getElementById("playerWrap");
    const reloadBtn = document.getElementById("reloadBtn");
    const statusText = document.getElementById("statusText");

    function buildEmbedUrl() {
      const base = "https://www.youtube-nocookie.com/embed/" + videoId;
      const params = new URLSearchParams({
        autoplay: "1",
        mute: "1",
        playsinline: "1",
        controls: "1",
        rel: "0",
        enablejsapi: "1"
      });

      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        params.set("origin", window.location.origin);
      }

      return base + "?" + params.toString();
    }

    function loadPlayer() {
      playerWrap.innerHTML = "";

      const iframe = document.createElement("iframe");
      iframe.src = buildEmbedUrl();
      iframe.title = "YouTube video player";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      iframe.loading = "eager";

      playerWrap.appendChild(iframe);

      statusText.textContent = "Starting muted autoplay...";
      setTimeout(() => {
        statusText.textContent = "If it does not start, press play inside the TV.";
      }, 4500);
    }

    function replayPowerAnimation() {
      const oldLayer = document.querySelector(".power-layer");
      const newLayer = oldLayer.cloneNode(true);
      oldLayer.replaceWith(newLayer);

      playerWrap.style.animation = "none";
      playerWrap.offsetHeight;
      playerWrap.style.animation = "";

      loadPlayer();
    }

    reloadBtn.addEventListener("click", replayPowerAnimation);

    window.addEventListener("load", () => {
      setTimeout(loadPlayer, 900);
    });
  </script>
</body>
</html>
